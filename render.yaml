services:
  - type: web
    name: agentmarket
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn main:app --worker-class uvicorn.workers.UvicornWorker --bind 0.0.0.0:$PORT
    healthCheckPath: /docs
    envVars:
      - key: DATABASE_URL
        value: sqlite:///./agentmarket.db
      - key: SECRET_KEY
        generateValue: true
      - key: COMMISSION_RATE
        value: "0.025"
      - key: DEBUG
        value: "false"
