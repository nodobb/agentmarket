services:
  - type: web
    name: agentmarket
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /docs
    envVars:
      - key: DATABASE_URL
        value: sqlite:///./agentmarket.db
      - key: SECRET_KEY
        generateValue: true
      - key: COMMISSION_RATE
        value: "0.025"
      - key: DEBUG
        value: "false"
